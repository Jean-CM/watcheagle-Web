services:
  # =========================
  # WEB APP
  # =========================
  - type: web
    name: watcheagle-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: watcheagle-db
          property: connectionString

      - key: LASTFM_API_KEY
        sync: false

      - key: ALERT_COOLDOWN_MIN
        value: "120"

      - key: BACKFILL_LIMIT
        value: "200"

      - key: BACKFILL_MAX_PAGES
        value: "10"

      - key: COLLECTOR_LIMIT
        value: "100"

      - key: COLLECTOR_MAX_PAGES
        value: "4"

      - key: REFRESH_LIMIT
        value: "100"

      - key: REFRESH_MAX_PAGES
        value: "3"

      - key: WARN_MIN
        value: "15"

      - key: INCIDENT_MIN
        value: "20"

  # =========================
  # CRON: CHECK
  # =========================
  - type: cron
    name: watcheagle-check
    schedule: "*/5 * * * *"
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python watch_scrobbles.py"

  # =========================
  # CRON: COLLECTOR
  # =========================
  - type: cron
    name: watcheagle-collector
    schedule: "*/10 * * * *"
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python collect_scrobbles.py"

  # =========================
  # CRON: REFRESH 24H
  # =========================
  - type: cron
    name: watcheagle-refresh24h
    schedule: "0 * * * *"
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python refresh_last_24h.py"

  # =========================
  # CRON: NUEVOS USUARIOS
  # =========================
  - type: cron
    name: watcheagle-new-users
    schedule: "0 */6 * * *"
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python backfill_new_users.py"

databases:
  - name: watcheagle-db
    plan: free
